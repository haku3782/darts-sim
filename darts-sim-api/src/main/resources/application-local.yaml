spring:
  datasource:
    url: jdbc:h2:mem:localdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

server:
  servlet:
    session:
      cookie:
        same-site: lax
        secure: false
