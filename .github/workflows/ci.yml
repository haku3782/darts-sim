name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ── フロントエンド ───────────────────────────────────────────────
  frontend:
    name: Frontend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: darts-sim-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: darts-sim-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # ── バックエンド ─────────────────────────────────────────────────
  backend:
    name: Backend (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: darts-sim-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test
        run: mvn test
