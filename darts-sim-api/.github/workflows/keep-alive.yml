name: Keep Render alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ダーツアプリ
        run: |
          curl -f https://darts-sim-api.onrender.com/health \
            && echo "ok" \
            || echo "failed"
